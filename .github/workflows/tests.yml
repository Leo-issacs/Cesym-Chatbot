name: tests

# Corre en cada push y en cada pull request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # La suite es hermética: fixtures sintéticos, sin data/raw/, sin BD externa
      # y sin credenciales. NO se inyectan secretos ni servicios a propósito: si un
      # test los necesitara, el test está mal, no el workflow.
      - name: Ejecutar tests
        run: pytest
